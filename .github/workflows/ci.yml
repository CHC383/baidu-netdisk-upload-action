name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # One workflow run at a time per ref. Superseded PR runs are cancelled,
  # but main runs are queued so an in-progress upload is never killed.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  dedupe:
    name: Check for duplicate run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      # Skip a push to main whose tree a previous run already tested
      # successfully (e.g. the PR run before the merge). Manual dispatches are
      # never skipped so the integration test can always be forced.
      - name: Check whether this tree was already tested
        id: check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          skip_after_successful_duplicate: "true"
          do_not_skip: '["workflow_dispatch"]'
          # Concurrency is handled by the workflow `concurrency:` block.
          concurrent_skipping: "never"
          cancel_others: "false"

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    needs: dedupe
    if: needs.dedupe.outputs.should_skip != 'true'

    outputs:
      dist: ${{ steps.filter.outputs.dist }}
      ci: ${{ steps.filter.outputs.ci }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install Dependencies
        id: pnpm-install
        run: pnpm install --frozen-lockfile

      - name: Lint and format Check
        id: lint-format-check
        run: pnpm biome:check

      - name: dist Check
        id: dist-check
        run: scripts/check_dist.sh

      - name: Detect dist and workflow Changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            dist:
              - 'dist/**'
            ci:
              - '.github/workflows/ci.yml'

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    needs: test-typescript
    # When to run the integration test (it logs into Baidu with repo secrets):
    #   - workflow_dispatch: always, so it can be triggered manually.
    #   - push to main: when dist or the workflow changed. Duplicate pushes are
    #     filtered upstream by the dedupe gate skipping test-typescript.
    #   - pull_request: only from a branch in this repo, and not from Dependabot.
    #     Fork PRs and Dependabot PRs (including its security updates) run in a
    #     restricted context without access to the BDUSS/STOKEN secrets, so the
    #     login/upload would fail. Renovate PRs come from in-repo branches and
    #     keep secret access, so they do run.
    if: |
      github.event_name == 'workflow_dispatch' ||
      ((needs.test-typescript.outputs.dist == 'true' || needs.test-typescript.outputs.ci == 'true') &&
      (github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]')))

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v7

      - name: Set Up Test Files
        id: setup-test-files
        env:
          TEST_DIR: ./test_files
        run: |
          DATE=$(date --iso-8601=seconds)
          mkdir -p $TEST_DIR
          echo "Upload file 1 $DATE" > $TEST_DIR/upload-1.txt
          echo "Upload file 2 $DATE" > $TEST_DIR/upload-2.txt
          echo "Not upload file 1 $DATE" > $TEST_DIR/not-upload-1.txt
          mkdir -p $TEST_DIR/subdir
          echo "Upload file 3 $DATE" > $TEST_DIR/subdir/upload-3.txt

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          bduss: ${{ secrets.BDUSS }}
          stoken: ${{ secrets.STOKEN }}
          target: "./test_files/upload*;./test_files/subdir/upload-3.txt"
          remote-dir: "/baidu-netdisk-upload-action-test/"
          upload-policy: "overwrite"

      - name: Verify Results
        id: verify-results
        # BaiduPCS-Go has been logged in through the action above
        run: |
          BAIDUPCS_GO_EXECUTABLE=$(find "$RUNNER_TOOL_CACHE/BaiduPCS-Go" -type f -name BaiduPCS-Go)
          DATE=$(TZ=Asia/Shanghai date +%F)
          LS_OUTPUT=$($BAIDUPCS_GO_EXECUTABLE ls /baidu-netdisk-upload-action-test/)
          grep --quiet "$DATE.*upload-1.txt" <<< "$LS_OUTPUT"
          grep --quiet "$DATE.*upload-2.txt" <<< "$LS_OUTPUT"
          grep --quiet "$DATE.*upload-3.txt" <<< "$LS_OUTPUT"
          grep --quiet --invert-match "not-upload-1.txt" <<< "$LS_OUTPUT"
